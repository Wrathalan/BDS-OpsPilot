services:
  rustdesk-hbbs:
    image: rustdesk/rustdesk-server:1.1.15
    container_name: opspilot-rustdesk-hbbs
    restart: unless-stopped
    command: ["hbbs", "-r", "${RUSTDESK_RELAY_SERVER:-127.0.0.1:21117}"]
    ports:
      - "21115:21115/tcp"
      - "21116:21116/tcp"
      - "21116:21116/udp"
      - "21118:21118/tcp"
    volumes:
      - rustdesk_data:/root

  rustdesk-hbbr:
    image: rustdesk/rustdesk-server:1.1.15
    container_name: opspilot-rustdesk-hbbr
    restart: unless-stopped
    command: ["hbbr"]
    ports:
      - "21117:21117/tcp"
      - "21119:21119/tcp"
    volumes:
      - rustdesk_data:/root

  opspilot:
    container_name: opspilot-rmm
    build:
      context: .
      dockerfile: Dockerfile
    image: opspilot-rmm:local
    restart: unless-stopped
    ports:
      - "${OPSPILOT_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:/data/opspilot.db"
      SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET in .env}"
      APP_URL: "${APP_URL:-http://127.0.0.1:3000}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-}"
      AGENT_SERVER_URL: "${AGENT_SERVER_URL:-http://127.0.0.1:3000}"
      APP_MODE: "live"
      TENANT_NAME: "${TENANT_NAME:-OpsPilot Live}"
      TENANT_SLUG: "${TENANT_SLUG:-opspilot-local}"
      BOOTSTRAP_ADMIN_USERNAME: "${BOOTSTRAP_ADMIN_USERNAME:-root}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:-root@localhost}"
      BOOTSTRAP_ADMIN_NAME: "${BOOTSTRAP_ADMIN_NAME:-root}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env}"
      REMOTE_PACKAGE_DIR: "/app/remote/packages"
      RUSTDESK_ID_SERVER: "${RUSTDESK_ID_SERVER:-127.0.0.1:21116}"
      RUSTDESK_RELAY_SERVER: "${RUSTDESK_RELAY_SERVER:-127.0.0.1:21117}"
      RUSTDESK_PUBLIC_KEY_PATH: "/rustdesk/id_ed25519.pub"
      RDP_FALLBACK_ENABLED: "${RDP_FALLBACK_ENABLED:-true}"
    volumes:
      - opspilot_data:/data
      - rustdesk_data:/rustdesk:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  opspilot_data:
    name: opspilot-rmm-data
  rustdesk_data:
    name: opspilot-rustdesk-data
